version: 2

builds:
  - main: ./cmd/tinker
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "tinker_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: mvaliolahi
    name: tinker

brews:
  - name: tinker
    homepage: "https://github.com/mvaliolahi/tinker"
    description: "Project-aware CLI for database, API, and gRPC interaction"
    tap:
      owner: mvaliolahi
      name: homebrew-tap
    install: |
      bin.install "tinker"
